global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Keycloak
  - job_name: "keycloak"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: "keycloak"

  # API Gateway (:8081)
  - job_name: "iam-gateway"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]
        labels:
          service: "iam-gateway"

  # Core Service (:8082)
  - job_name: "iam-core-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8082"]
        labels:
          service: "iam-core-service"

  # Tenant Service (:8083)
