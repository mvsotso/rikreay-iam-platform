version: "3.9"

# =============================================================================
# RikReay IAM Enterprise Platform — Docker Infrastructure
# =============================================================================
# Usage:
#   DEV:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#   UAT:  docker compose -f docker-compose.yml -f docker-compose.uat.yml --env-file .env.uat up -d
#   PROD: kubectl apply -k k8s/overlays/prod/  (use K8s, not compose)
#
# Profiles:
#   docker compose --profile core up -d       → postgres, keycloak, redis, kafka, elasticsearch
#   docker compose --profile full up -d       → all services
#   docker compose -f docker-compose.yml -f docker-compose.xroad.yml --profile xroad up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Schema-per-service (11 databases)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: iam-postgres
    profiles: ["core", "full"]
    environment:
      POSTGRES_USER: iam_admin
      POSTGRES_PASSWORD: iam_secret_2026
      POSTGRES_DB: keycloak_db
      POSTGRES_MULTIPLE_DATABASES: "keycloak_db,iam_core,iam_tenant,iam_audit,iam_xroad,iam_admin,iam_monitoring,iam_governance,iam_developer,iam_notification,iam_config"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts/create-multiple-databases.sh:/docker-entrypoint-initdb.d/create-multiple-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iam_admin -d keycloak_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - iam-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Keycloak 26.5.5 — Identity Provider
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    container_name: iam-keycloak
    profiles: ["core", "full"]
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: iam_admin
      KC_DB_PASSWORD: iam_secret_2026
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_FEATURES: authorization,token-exchange,admin-fine-grained-authz
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8080:8080"
    volumes:
      - ../keycloak/realms:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - iam-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis 7 — Caching & Rate Limiting
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: iam-redis
    profiles: ["core", "full"]
    command: redis-server --requirepass redis_secret_2026 --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret_2026", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - iam-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Kafka (Confluent 7.6.0) — KRaft mode (no Zookeeper)
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: iam-kafka
    profiles: ["core", "full"]
    environment:
      # KRaft settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Cluster
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Auto-create topics
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - iam-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Kafka Init — Create topics with dot-notation
  # ---------------------------------------------------------------------------
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: iam-kafka-init
    profiles: ["core", "full"]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic iam.audit.events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic iam.xroad.events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic iam.notification.commands --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic iam.platform.events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic iam.alert.triggers --partitions 3 --replication-factor 1
      echo 'Topics created:'
      kafka-topics --bootstrap-server kafka:29092 --list
      "
    networks:
      - iam-network

  # ---------------------------------------------------------------------------
  # Elasticsearch 8.12 — Audit Log Indexing
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: iam-elasticsearch
    profiles: ["core", "full"]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=iam-cluster
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - iam-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Kibana 8.12 — Elasticsearch UI
  # ---------------------------------------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: iam-kibana
    profiles: ["full"]
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - iam-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Prometheus v2.49 — Metrics Collection
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.49.0
    container_name: iam-prometheus
    profiles: ["full"]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - iam-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana 10.3 — Dashboards
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.3.0
    container_name: iam-grafana
    profiles: ["full"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - iam-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # HashiCorp Vault 1.15 — Secrets Management
  # ---------------------------------------------------------------------------
  vault:
    image: hashicorp/vault:1.15
    container_name: iam-vault
    profiles: ["full"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: iam-dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault/data
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://localhost:8200 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - iam-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Mailpit — Dev Email (SMTP + Web UI)
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: iam-mailpit
    profiles: ["full"]
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/api/v1/info || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - iam-network
    restart: unless-stopped

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
    name: iam-postgres-data
  redis-data:
    name: iam-redis-data
  kafka-data:
    name: iam-kafka-data
  elasticsearch-data:
    name: iam-elasticsearch-data
  prometheus-data:
    name: iam-prometheus-data
  grafana-data:
    name: iam-grafana-data
  vault-data:
    name: iam-vault-data

# =============================================================================
# Networks
# =============================================================================
networks:
  iam-network:
    name: iam-network
    driver: bridge
