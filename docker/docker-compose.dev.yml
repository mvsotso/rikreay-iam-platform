version: "3.9"

# =============================================================================
# DEV Environment Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# =============================================================================
# In DEV, services run locally via `mvn spring-boot:run -Dspring-boot.run.profiles=dev`
# This overlay only adds dev-specific configuration to infrastructure containers.
# All ports exposed on localhost, no TLS, SPRING_PROFILES_ACTIVE=dev
# =============================================================================

services:
  postgres:
    environment:
      POSTGRES_USER: iam_admin
      POSTGRES_PASSWORD: iam_secret_2026

  keycloak:
    environment:
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded

  redis:
    command: redis-server --requirepass redis_secret_2026 --maxmemory 256mb --maxmemory-policy allkeys-lru
