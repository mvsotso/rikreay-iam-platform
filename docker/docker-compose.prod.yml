version: "3.9"

# =============================================================================
# PROD Environment Override — REFERENCE ONLY
# =============================================================================
# Production MUST use Kubernetes: kubectl apply -k k8s/overlays/prod/
# This file exists as a reference for Docker Compose-based staging or
# Cambodia-based data center deployments where K8s is not yet available.
#
# Production data MUST reside on infrastructure physically located in Cambodia
# (LPDP Article 22, 24 — data localization requirement).
#
# Usage (if needed): docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d
# =============================================================================

services:
  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: []

  keycloak:
    command: start --import-realm
    environment:
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: rikreay.duckdns.org
      KC_HOSTNAME_PATH: /auth
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
    ports: []

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports: []

  kafka:
    environment:
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports: []

  elasticsearch:
    environment:
      - xpack.security.enabled=true
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports: []

  kibana:
    ports: []

  grafana:
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://rikreay.duckdns.org/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    ports: []
