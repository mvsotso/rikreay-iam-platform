spring:
  cloud:
    gateway:
      server:
        webflux:
          routes: []
          default-filters: []
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/iam-platform
          jwk-set-uri: http://localhost:8080/realms/iam-platform/protocol/openid-connect/certs
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    root: WARN
