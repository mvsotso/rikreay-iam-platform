server:
  port: 8888

spring:
  application:
    name: iam-config-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:native,dev}
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config-repo
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/iam_config
    username: ${POSTGRES_USER:iam_admin}
    password: ${POSTGRES_PASSWORD:iam_secret_2026}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8080}/realms/${KEYCLOAK_REALM:iam-platform}
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8080}/realms/${KEYCLOAK_REALM:iam-platform}/protocol/openid-connect/certs
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

app:
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:3000
      - http://localhost:5173

logging:
  level:
    root: INFO
    com.iam.platform: DEBUG
