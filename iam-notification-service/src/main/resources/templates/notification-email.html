<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${subject}">Notification</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; padding: 30px; }
        .header { text-align: center; border-bottom: 2px solid #1a56db; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { color: #1a56db; font-size: 24px; margin: 0; }
        .content { padding: 10px 0; line-height: 1.6; color: #333; }
        .footer { margin-top: 30px; padding-top: 15px; border-top: 1px solid #eee; text-align: center; color: #888; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>RikReay IAM Platform</h1>
        </div>
        <div class="content">
            <p th:text="${message}">Notification message content</p>
        </div>
        <div class="footer">
            <p>RikReay IAM Enterprise Platform - Cambodia National Identity &amp; Access Management</p>
            <p>This is an automated notification. Please do not reply to this email.</p>
        </div>
    </div>
</body>
</html>
