server:
  port: 8084

spring:
  application:
    name: iam-audit-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/iam_audit
    username: ${POSTGRES_USER:iam_admin}
    password: ${POSTGRES_PASSWORD:iam_secret_2026}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8080}/realms/${KEYCLOAK_REALM:iam-platform}
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8080}/realms/${KEYCLOAK_REALM:iam-platform}/protocol/openid-connect/certs
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: iam-audit-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.iam.platform.common.dto
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.iam.platform.common.dto.AuditEventDto
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
  elasticsearch:
    uris: ${ELASTICSEARCH_URL:http://localhost:9200}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

app:
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:3000
      - http://localhost:5173
  audit:
    elasticsearch-enabled: ${AUDIT_ES_ENABLED:true}
    index-prefix: iam-audit
    xroad-index-prefix: iam-xroad

logging:
  level:
    root: INFO
    com.iam.platform: DEBUG
