apiVersion: apps/v1
kind: Deployment
metadata:
  name: iam-core-service
  labels:
    app: iam-core-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: iam-core-service
  template:
    metadata:
      labels:
        app: iam-core-service
    spec:
      containers:
        - name: iam-core-service
          image: rikreay/iam-core-service:latest
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: CONFIG_SERVER_HOST
              value: "iam-config-service"
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: iam-platform-config
                  key: postgres-host
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: iam-platform-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iam-platform-secrets
                  key: postgres-password
            - name: KEYCLOAK_URL
              valueFrom:
                configMapKeyRef:
                  name: iam-platform-config
                  key: keycloak-url
            - name: KAFKA_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: iam-platform-config
                  key: kafka-servers
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
