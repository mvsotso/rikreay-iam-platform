apiVersion: apps/v1
kind: Deployment
metadata:
  name: iam-gateway
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: iam-gateway
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "uat"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iam-core-service
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: iam-core-service
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "uat"
