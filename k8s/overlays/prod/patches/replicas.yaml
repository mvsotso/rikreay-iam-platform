apiVersion: apps/v1
kind: Deployment
metadata:
  name: iam-gateway
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: iam-gateway
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
---
