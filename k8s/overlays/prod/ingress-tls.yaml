apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: iam-gateway-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - rikreay.duckdns.org
      secretName: rikreay-tls-secret
  rules:
    - host: rikreay.duckdns.org
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: iam-gateway
                port:
                  number: 8081
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
          - path: /swagger-ui
            pathType: Prefix
            backend:
              service:
                name: iam-gateway
                port:
                  number: 8081
