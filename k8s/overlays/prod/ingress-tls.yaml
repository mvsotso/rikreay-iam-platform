apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: iam-gateway-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - rikreay.duckdns.org
      secretName: rikreay-tls-secret
  rules:
    - host: rikreay.duckdns.org
      http:
        paths:
          # API Gateway — routes all /api/** requests to services
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: iam-gateway
                port:
                  number: 8081
          # Keycloak — authentication
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
          # Swagger UI
          - path: /swagger-ui
            pathType: Prefix
            backend:
              service:
                name: iam-gateway
                port:
                  number: 8081
          # Developer Portal — public API docs (direct access)
          - path: /api/v1/docs
            pathType: Prefix
            backend:
              service:
                name: iam-developer-portal
                port:
                  number: 8089
          # Developer Portal — SDK info (direct access)
          - path: /api/v1/sdks
            pathType: Prefix
            backend:
              service:
                name: iam-developer-portal
                port:
                  number: 8089
          # Config Service — native config endpoints (bootstrap)
          - path: /iam-
            pathType: Prefix
            backend:
              service:
                name: iam-config-service
                port:
                  number: 8888
