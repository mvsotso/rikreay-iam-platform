spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/iam_monitoring
    username: iam_admin
    password: iam_secret_2026
  kafka:
    bootstrap-servers: localhost:9092
  data:
    redis:
      host: localhost
      port: 6379
      password: redis_secret_2026
  elasticsearch:
    uris: http://localhost:9200
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/iam-platform

management:
  health:
    elasticsearch:
      enabled: false

logging:
  level:
    com.iam.platform: DEBUG
    org.springframework.security: DEBUG
