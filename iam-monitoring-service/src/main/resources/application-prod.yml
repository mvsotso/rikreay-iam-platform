server:
  ssl:
    enabled: ${SSL_ENABLED:false}

spring:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:5432/iam_monitoring
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS}
    producer:
      acks: all
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
  elasticsearch:
    uris: ${ELASTICSEARCH_URL}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM:iam-platform}

# Disable Swagger/API docs in production
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    root: WARN
    com.iam.platform: INFO
